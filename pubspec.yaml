name: alertsysapp
description: A new Flutter project.

publish_to: "none"

version: 1.1.1+6

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  rxdart: ^0.27.7
  share_plus: ^10.1.0
  path_provider: ^2.1.5
  file_saver: ^0.2.0   # optional, but simplifies web saves
  printing: ^5.13.2
  universal_html: ^2.2.4
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^18.0.1
  shorebird_code_push: ^1.0.0
  vibration: ^3.1.4
  google_generative_ai: ^0.4.3
  device_info_plus: ^11.0.0
  http: ^1.3.0
  csv: ^6.0.0
  excel: ^4.0.0
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.3.0

  # Voice command stack:
  #   - Android (production): sherpa_onnx offline ASR — streaming Zipformer
  #     model downloaded on first launch, then fully offline. Dramatically
  #     more accurate than Android SpeechRecognizer in factory noise.
  #   - Other platforms (web/desktop test builds): speech_to_text fallback.
  # flutter_tts configured in voice_service_io.dart for max-volume factory TTS.
  sherpa_onnx: ^1.11.3
  archive: ^3.6.1
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  permission_handler: ^11.3.1

  # AR Work Instructions — camera passthrough + QR scanning for the
  # ar_instruction_screen.dart flow. mobile_scanner replaces the unmaintained
  # qr_code_scanner (broken on AGP 8+).
  mobile_scanner: ^6.0.11

  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_database: 12.1.3

  # UI helpers
  google_fonts: ^6.3.0
  intl: ^0.20.2
  provider: ^6.1.2
  tflite_flutter: ^0.12.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - shorebird.yaml
    - assets/models/conformer_tisid_small.tflite
