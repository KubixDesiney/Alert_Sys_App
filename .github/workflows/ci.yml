name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-flight run for the same ref so PRs only ever have one CI run
# in flight at once.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.27.4'
  NODE_VERSION: '20'
  AUTO_FIX_URL: 'https://alert-notifier.aziz-nagati01.workers.dev/auto-fix'

jobs:
  flutter:
    name: Flutter (analyze, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can inspect the previous commit message and
          # diff files changed in HEAD vs HEAD~1 for the auto-fix step.
          fetch-depth: 2

      - name: Set up JDK 17 (required by AGP 8 / Flutter Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub-cache and .dart_tool
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Resolve dependencies
        run: flutter pub get

      - name: Static analysis
        # The codebase carries pre-existing deprecation infos (e.g.
        # `withOpacity` → `withValues`) and a few unused-element warnings.
        # CI fails only on real errors so the suite stays meaningful while
        # those infos are migrated incrementally.
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # ── Self-healing: run tests and capture output ──────────────────────────
      - name: Run tests and capture errors
        id: tests
        # continue-on-error so subsequent steps can inspect the failure and
        # call the auto-fix endpoint before the job officially fails.
        continue-on-error: true
        run: flutter test --reporter expanded 2>&1 | tee test_output.log

      # ── Guard: never auto-fix a commit that was already an auto-fix ─────────
      - name: Check for AI-fix commit (skip auto-fix loop guard)
        id: guard
        if: steps.tests.outcome == 'failure'
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          if [[ "$LAST_MSG" == "🤖"* ]]; then
            echo "is_autofix=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Last commit is an AI auto-fix; skipping self-heal to prevent infinite loop."
          else
            echo "is_autofix=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Find the failing test file from this commit's diff ──────────────────
      - name: Determine failing test file
        id: find_test
        if: steps.tests.outcome == 'failure' && steps.guard.outputs.is_autofix == 'false'
        run: |
          # Prefer test files changed in this commit; fall back to the first
          # test file mentioned in the error output.
          FAILING_FILE=$(git diff --name-only HEAD~1 HEAD 2>/dev/null \
            | grep '_test\.dart$' | head -1)

          if [ -z "$FAILING_FILE" ]; then
            # Parse the log for a path that ends in _test.dart
            FAILING_FILE=$(grep -oP '[^\s]+_test\.dart' test_output.log \
              | head -1 | sed 's/^.*alertsysapp\///')
          fi

          echo "file=$FAILING_FILE" >> "$GITHUB_OUTPUT"
          if [ -n "$FAILING_FILE" ]; then
            echo "Found failing test file: $FAILING_FILE"
          else
            echo "::warning::Could not determine which test file to fix."
          fi

      # ── Call the Worker's /auto-fix endpoint ────────────────────────────────
      - name: Call AI auto-fix endpoint
        id: autofix
        if: >-
          steps.tests.outcome == 'failure' &&
          steps.guard.outputs.is_autofix == 'false' &&
          steps.find_test.outputs.file != ''
        run: |
          FAILING_FILE="${{ steps.find_test.outputs.file }}"
          ERRORS=$(cat test_output.log)
          CODE=$(cat "$FAILING_FILE")

          # Escape the three fields as JSON strings so the payload is valid.
          PAYLOAD=$(jq -n \
            --arg testFile "$FAILING_FILE" \
            --arg code     "$CODE" \
            --arg errors   "$ERRORS" \
            '{testFile: $testFile, code: $code, errors: $errors}')

          RESPONSE=$(curl -s -X POST "${{ env.AUTO_FIX_URL }}" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD")

          FIXED=$(echo "$RESPONSE" | jq -r '.fixedCode // empty')

          if [ -n "$FIXED" ]; then
            echo "fixed=true"  >> "$GITHUB_OUTPUT"
            # Write the fixed code; printf avoids any trailing-newline issues.
            printf '%s' "$FIXED" > "$FAILING_FILE"
            echo "Applied AI fix to $FAILING_FILE"
          else
            echo "fixed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AI returned an empty fix for $FAILING_FILE"
          fi

      # ── Commit and push the fix; the push re-triggers the workflow ──────────
      - name: Commit and push AI fix
        if: >-
          steps.tests.outcome == 'failure' &&
          steps.guard.outputs.is_autofix == 'false' &&
          steps.autofix.outputs.fixed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.find_test.outputs.file }}"
          git commit -m "🤖 Auto-fix failing test: ${{ steps.find_test.outputs.file }}"
          git push origin HEAD
        env:
          # GITHUB_TOKEN has push access on the same repo by default.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Fail the job when tests broke but no fix was applied ────────────────
      - name: Fail if tests failed and no auto-fix was applied
        if: >-
          steps.tests.outcome == 'failure' &&
          (steps.guard.outputs.is_autofix == 'true' ||
           steps.autofix.outputs.fixed   != 'true')
        run: |
          echo "Tests failed and no automatic fix was applied."
          echo "See test_output.log above for details."
          exit 1

      # ── Normal build steps (only reached when tests passed) ─────────────────
      - name: Build Android APK (debug)
        if: steps.tests.outcome == 'success'
        # Debug build keeps signing requirements off the critical path. The
        # release pipeline lives in deploy.yml and stays out of CI.
        run: flutter build apk --debug

      - name: Build Web release
        if: steps.tests.outcome == 'success'
        run: flutter build web --release

      - name: Upload web build artefact
        if: steps.tests.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          if-no-files-found: error
          retention-days: 7

  worker:
    name: Cloudflare Worker (Jest + deploy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only deploy when Flutter tests passed and this isn't an AI auto-fix
    # commit (those just carry a test-file change; the worker didn't change).
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install JS dependencies
        run: npm ci || npm install

      - name: Run worker Jest tests
        run: npm test

      - name: Deploy worker via wrangler
        # Only deploy on direct pushes to main that are NOT AI auto-fix
        # commits (those commits only touch test files, not the worker).
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          !startsWith(github.event.head_commit.message, '🤖')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — skipping worker deploy"
            exit 0
          fi
          npx wrangler deploy
